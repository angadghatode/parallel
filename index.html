<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.png" /> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MyParallel</title>
    <link href="https://fonts.googleapis.com/css2?family=Jersey+10&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/src/css/main.css">

    <meta name="theme-color" content="#0B0B1A" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%; margin: 0 !important; padding: 0 !important;
            overflow: hidden; background-color: #0B0B1A; 
            position: fixed; top: 0; left: 0; overscroll-behavior: none; touch-action: none;
        }
        canvas { display: block; position: absolute; top: 0; left: 0; width: 100%; height: 100%; outline: none; }
    </style>
  </head>
  <body>
    <div id="app-container">
        <div id="star-layer"></div>
        <div id="pixi-container"></div>
        <div id="weather-layer"></div>

        <img id="weather-sun" src="/assets/sun.png" alt="Sunny" style="opacity: 0;" />
        <img id="weather-moon" src="/assets/moon.png" alt="Moon" style="opacity: 0;" /> 
        <div id="weather-clouds"></div>
        
        <div id="ui-overlay" style="opacity: 0; transition: opacity 1s ease;" >
            <div id="title">ANGAD'S ROOM</div>
            <div id="live-clock"></div>
            <div id="live-weather-text"></div>

            <button id="menu-btn" class="img-btn" title="Toggle Task Log">
                <img src="/assets/button_menu.png" alt="Menu">
            </button>

            <div id="task-sidebar" class="hidden-panel">
                <button id="close-sidebar-btn" class="img-btn">
                    <img src="/assets/button_close.png" alt="Close">
                </button>
                
                <div class="sidebar-header">
                    <h2>TASK SUMMARY</h2>
                </div>
                
                <div id="task-sidebar-list">
                    </div>
                
                <div id="queue-input-container" style="display: none; margin-top: 2vmin; width: 100%;">
                    <input type="text" id="queue-input" class="sidebar-task-notes" placeholder="TYPE TASK AND PRESS ENTER..." style="min-height: auto; padding: 1.5vmin; margin: 0; width: 100%; box-sizing: border-box;" />
                </div>
                
                <button id="queue-btn" class="text-btn" style="width: 100%; margin-top: 2vmin; padding: 1.5vmin; border: 2px dashed var(--ui-text-secondary); background: transparent; color: var(--ui-text-secondary); cursor: pointer;">+ QUEUE TASK</button>
                
                <p id="estimated-finish" style="margin: 20px 0 0 0; font-size: 2vmin; color: var(--ui-text-secondary); text-align: center;">EST FINISH: --:--</p>
            </div>

            <div id="timer-box">
                <div class="time" id="timer-display">25:00</div>
                <div id="task-input-container">
                    <input type="text" id="task-input" placeholder="CLICK TO SET TASK..." />
                    <button id="start-btn" class="img-btn"><img src="/assets/button.png" alt="Start"></button>
                    <button id="button_pause" class="img-btn" style="display: none;"><img src="/assets/button_pause.png" alt="Pause"></button>
                    <button id="button_stop" class="img-btn" style="display: none;"><img src="/assets/button_stop.png" alt="Stop"></button>
                </div>

                <div id="continue-popup" style="display: none;" class="ui-panel">
                    <p>Break over! Resume current task or continue with next task?</p>
                    <div style="display: flex; gap: 10px; margin-top: 10px; justify-content: center;">
                        <button id="btn-resume-task" class="img-btn"><img src="/assets/button.png" alt="Resume"></button>
                        <button id="btn-next-task" class="img-btn"><img src="/assets/button_next.png" alt="Next Task"></button>
                    </div>
                </div>

            </div>

            <div id="speech-bubble-wrap" class="hidden">
                <div id="speech-bubble-border"></div>
                <div id="speech-bubble">
                    <img id="bubble-portrait" src="/assets/portrait.webp" alt="Angad">
                    <div id="speech-bubble-content">
                        <span id="bubble-name">ANGAD</span>
                        <span id="bubble-body">...</span>
                    </div>
                </div>
                <div id="speech-bubble-tail-outer"></div>
                <div id="speech-bubble-tail-inner"></div>
            </div>

        </div>
    </div>
  
    <div id="loading-screen">
        <div class="loading-text">LOADING...</div>
    </div>
  
    <script type="module" src="/src/js/main.js"></script>
  </body>
</html>
