<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/assets/favicon-8F4fWXP3.png" /> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MyParallel</title>
    <link href="https://fonts.googleapis.com/css2?family=Jersey+10&display=swap" rel="stylesheet">

    <style>
        /* NUCLEAR CSS RESET (Embedded to guarantee it works) */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            margin: 0 !important;   /* Force remove margins */
            padding: 0 !important;  /* Force remove padding */
            overflow: hidden;       /* Kill scrollbars */
            background-color: #0d2f6d; /* Match game background */
            
            /* Mobile Locks */
            position: fixed;
            top: 0;
            left: 0;
            overscroll-behavior: none;
            touch-action: none;
        }

        /* Ensure the canvas fills the screen exactly */
        canvas {
            display: block; 
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            outline: none; /* Removes blue selection outline */
        }
    </style>

    <script type="module" crossorigin src="/assets/index-Dk7Wrsuu.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-clbdtVHV.css">
  </head>
